blueprint:
  name: Hippo's Irrigation Zone Calculation
  description: >-
    Automatically calculate the required runtime for an irrigation zone.
    (V2)
  domain: automation
  source_url: https://github.com/hippotastic/hippos-home-assistant-toolbox/blob/main/blueprints/automation/irrigation_zone_calculation.yaml
  author: Hippo
  homeassistant:
    min_version: 2024.6.0
  input:
    zone_section:
      name: " 🌳 Irrigation zone settings"
      collapsed: false
      input:
        valve_entity:
          name: Irrigation zone valve switch
          selector:
            entity:
              filter:
                - domain: switch

        status_helper_entity:
          name: Irrigation zone status helper
          description: |
            A string helper for up to 254 characters. Required to store the runtime calculated by this automation and other information.
          selector:
            entity:
              filter:
                - domain: input_text

        base_runtime_minutes:
          name: Base runtime
          description: |
            The default runtime of this zone. Will be modified by factors based on rainfall and temperature during the last 24 hours.
          default: 10
          selector:
            number:
              min: 1
              max: 60
              unit_of_measurement: "minutes"

        watering_interval_days:
          name: Watering interval (every X days)
          description: |
            The amount of days that must have passed since the last scheduled watering before this zone is allowed to run again.
          default: 1
          selector:
            number:
              min: 1
              max: 7
              unit_of_measurement: "days"

    environment_section:
      name: " 🌍 Environment information"
      collapsed: true
      input:
        rainfall_percentage_of_last_24h_entity:
          name: Rainfall percentage of the last 24h statistics sensor
          selector:
            entity:
              filter:
                - domain:
                    - sensor

        max_temperature_of_last_24h_entity:
          name: Maximum temperature of the last 24h statistics sensor
          selector:
            entity:
              filter:
                - domain:
                    - sensor

trigger_variables:
  # Configuration inputs
  valve_entity: !input valve_entity
  status_helper_entity: !input status_helper_entity
  base_runtime_minutes: !input base_runtime_minutes
  watering_interval_days: !input watering_interval_days
  rainfall_percentage_of_last_24h_entity: !input rainfall_percentage_of_last_24h_entity
  max_temperature_of_last_24h_entity: !input max_temperature_of_last_24h_entity

triggers:
  # The automation was enabled or any settings were changed
  - trigger: template
    value_template: "{% if this is defined and this != None %}{{ is_state(this.entity_id, ['on', 'true']) }}{% endif %}"
    id: "trigger_automation_enabled"
  # Every hour at 58 minutes past whole
  - trigger: time_pattern
    minutes: 58
    id: "trigger_time_based_update"

# If the automation is triggered again while still being executed, restart it
mode: restart
max_exceeded: silent

variables:
  # event: >-
  #   {% if trigger.platform in ['state', 'template', 'time_pattern'] %}
  #     Running due to {{ trigger.id }} (from {{ trigger.from_state.state }} to {{ trigger.to_state.state }})
  #   {% else %}
  #     Running manually (through UI)
  #   {% endif %}
  # Perform zone runtime calculation
  rainfall_percentage_of_last_24h: "{{ states(rainfall_percentage_of_last_24h_entity) | float(default=0) }}"
  max_temperature_of_last_24h: "{{ states(max_temperature_of_last_24h_entity) | float(default=20) }}"
  rain_minutes_in_last_24h: "{{ (24 * 60 * rainfall_percentage_of_last_24h / 100) | round(0, 'ceil') }}"
  rain_factor: "{{ ([0, 1 - rain_minutes_in_last_24h / 30] | max) | round(2) }}"
  heat_factor: "{{ (0.7 + ([1, ([0, (max_temperature_of_last_24h - 25) / 10] | max)] | min) * 1.3) | round(2) }}"
  cold_factor: "{{ iif(max_temperature_of_last_24h < 12, 0, 1) }}"
  combined_factor: "{{ (rain_factor * heat_factor * cold_factor) | round(2) }}"
  runtime_minutes: "{{ (base_runtime_minutes * combined_factor) | round(0, 'ceil') }}"
  # Get current value of status helper
  old_status: >-
    {{ states(status_helper_entity) | regex_replace('^(?!\{.*\}$).*', '{}') }}

actions:
  # # Log why we are running
  # - service: logbook.log
  #   data:
  #     name: "Hippo's Irrigation Zone Calculation:"
  #     message: "{{ event }}"
  # Only continue if we need to update any of our output properties in the status helper
  - condition: template
    value_template: >-
      {{
        old_status.valve != valve_entity or
        old_status.interval != watering_interval_days or
        old_status.runtime != runtime_minutes
      }}
  # Update helper
  - action: input_text.set_value
    target:
      entity_id: "{{ status_helper_entity }}"
    data:
      value: >-
        {{
          dict(old_status, **{
            'valve': valve_entity,
            'interval': watering_interval_days,
            'runtime': runtime_minutes
          }) | to_json
        }}
